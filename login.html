<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Back</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-container">
  <div class="auth-card login-card">
    <div class="auth-header">
      <div class="auth-logo">🔐</div>
      <h2>Welcome Back</h2>
      <p>Sign in to continue</p>
    </div>

    <form id="loginForm" class="auth-form">
      <div class="form-group full-width">
        <input type="email" id="email" placeholder="Email Address" class="auth-input" required>
      </div>

      <div class="form-group full-width">
        <input type="password" id="password" placeholder="Password" class="auth-input" required>
      </div>

      <div class="form-group full-width" style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="remember" style="width:auto;height:18px;cursor:pointer;">
        <label for="remember" style="cursor:pointer;color:#666;">Remember me</label>
      </div>

      <button type="submit" id="loginBtn" class="auth-btn">🎯 Sign In</button>

      <ul id="errorList" class="error-list"></ul>

      <p class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </p>
    </form>
  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
